<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiology Revision — 100 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --wrong: #f85149;
    --gold: #e3b341;
    --text: #c9d1d9;
    --muted: #8b949e;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    padding: 2rem 1rem 4rem;
  }
  header {
    max-width: 860px;
    margin: 0 auto 2.5rem;
    border-bottom: 2px solid var(--border);
    padding-bottom: 1.5rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: #fff;
    line-height: 1.1;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    margin-top: 0.6rem;
  }
  .score-bar {
    max-width: 860px;
    margin: 0 auto 2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    position: sticky;
    top: 0.5rem;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .score-bar strong { color: var(--accent); font-size: 1.1rem; }
  .score-bar .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .section-label {
    max-width: 860px;
    margin: 2rem auto 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    border-left: 3px solid var(--gold);
    padding-left: 0.7rem;
  }
  .question-card {
    max-width: 860px;
    margin: 0 auto 1.2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .question-card.answered { border-color: var(--border); }
  .question-card.correct { border-color: var(--accent2); }
  .question-card.incorrect { border-color: var(--wrong); }
  .q-header {
    padding: 1rem 1.4rem 0.8rem;
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text { font-size: 0.95rem; color: #e6edf3; font-weight: 500; }
  .options { padding: 0 1.4rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .opt-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.6rem 1rem;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #1c2230; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn .letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    background: var(--border);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .opt-btn.correct-ans { background: #0d2818; border-color: var(--accent2); color: #3fb950; }
  .opt-btn.correct-ans .letter { background: #1a4228; }
  .opt-btn.wrong-ans { background: #2d1117; border-color: var(--wrong); color: #f85149; }
  .opt-btn.wrong-ans .letter { background: #3d1a1e; }
  .explanation {
    background: #0e1a2e;
    border-top: 1px solid var(--border);
    padding: 0.8rem 1.4rem;
    font-size: 0.85rem;
    color: #8fb8e8;
    display: none;
    line-height: 1.6;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }
  .result-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .tag-correct { background: #0d2818; color: var(--accent2); }
  .tag-wrong { background: #2d1117; color: var(--wrong); }

/* ── Gap Fill ── */
.gf-card {
max-width: 860px;
margin: 0 auto 1.2rem;
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius);
overflow: hidden;
transition: border-color 0.2s;
}
.gf-card.gf-done { border-color: var(–accent); }
.gf-header { padding: 1rem 1.4rem 0.8rem; display: flex; gap: 0.8rem; align-items: flex-start; }
.gf-num {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.72rem;
color: var(–muted);
background: var(–border);
padding: 0.2rem 0.5rem;
border-radius: 4px;
white-space: nowrap;
margin-top: 2px;
flex-shrink: 0;
}
.gf-label { font-size: 0.72rem; font-family: ‘IBM Plex Mono’, monospace; color: var(–gold); background: #2a1f00; padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: 0.3rem; flex-shrink:0; }
.gf-text { font-size: 0.95rem; color: #e6edf3; font-weight: 500; }
.gf-passage {
padding: 0 1.4rem 0.5rem;
font-size: 0.92rem;
color: var(–text);
line-height: 2;
}
.gf-blank {
display: inline-block;
border: none;
border-bottom: 2px solid var(–accent);
background: transparent;
color: var(–accent);
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.88rem;
width: 160px;
padding: 0 4px;
outline: none;
text-align: center;
transition: border-color 0.2s;
}
.gf-blank:focus { border-color: var(–gold); }
.gf-blank.gf-correct { border-color: var(–accent2); color: var(–accent2); }
.gf-blank.gf-wrong  { border-color: var(–wrong);  color: var(–wrong); }
.gf-wordbank {
padding: 0 1.4rem 0.8rem;
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
font-size: 0.8rem;
}
.gf-wordbank span {
font-family: ‘IBM Plex Mono’, monospace;
background: var(–border);
color: var(–muted);
padding: 0.2rem 0.6rem;
border-radius: 4px;
}
.gf-wordbank em { color: var(–muted); font-style: normal; font-size: 0.75rem; margin-right: 0.2rem; }
.gf-submit-btn {
margin: 0 1.4rem 1rem;
background: var(–accent);
color: #0d1117;
border: none;
border-radius: 6px;
padding: 0.5rem 1.2rem;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.82rem;
cursor: pointer;
font-weight: 600;
transition: opacity 0.2s;
}
.gf-submit-btn:hover { opacity: 0.85; }
.gf-submit-btn:disabled { opacity: 0.4; cursor: default; }
.gf-explanation {
background: #0e1a2e;
border-top: 1px solid var(–border);
padding: 0.8rem 1.4rem;
font-size: 0.85rem;
color: #8fb8e8;
display: none;
line-height: 1.6;
}
.gf-explanation.show { display: block; }
.gf-explanation strong { color: var(–accent); }
.gf-result-row { padding: 0.4rem 1.4rem 0.6rem; font-family: ‘IBM Plex Mono’, monospace; font-size: 0.78rem; display: none; }
.gf-result-row.show { display: block; }
.gf-result-row .mark { color: var(–accent2); }
.gf-result-row .mark-wrong { color: var(–wrong); }
footer {
max-width: 860px;
margin: 3rem auto 0;
text-align: center;
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.75rem;
color: var(–muted);
}
@media (max-width: 600px) {
body { padding: 1rem 0.5rem 3rem; }
.score-bar { flex-wrap: wrap; }
}
</style>

</head>
<body>

<header>
  <h1>Physiology <span>Revision</span></h1>
  <p>MOD008108 · 100 Practice Questions · Select an answer to reveal explanation</p>
</header>

<div class="score-bar">
  <span>Score: <strong id="score-display">0 / 0</strong></span>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  <span id="pct-display">0%</span>
</div>

<div id="quiz-container"></div>

<div class="section-label" style="max-width:860px;margin:2.5rem auto 1rem;">✏️ Gap Fill Questions — Worth 3 marks each</div>
<div id="gf-container"></div>
<footer>
  <p>Physiology Revision Set · For exam preparation only · Good luck! 🧬</p>
</footer>

<script>
const questions = [
  // ── HOMEOSTASIS & FEEDBACK ─────────────────────────────────────────────
  {
    section: "🔁 Homeostasis & Feedback",
    q: "Which of the following best describes a negative feedback mechanism?",
    opts: ["A deviation from the set point triggers a response that restores the system to normal", "A change in a variable causes further change in the same direction", "A receptor sends signals directly to the brain", "Hormones increase continuously until stopped externally"],
    ans: 0,
    exp: "<strong>Negative feedback</strong> detects a deviation from the set point and triggers a corrective response that reverses the change — restoring the variable back to its normal range."
  },
  {
    q: "Which of the following scenarios is the best example of positive feedback?",
    opts: ["Sweating when body temperature rises", "Blood clotting — clotting factors amplify the response until the wound is sealed", "Insulin released when blood glucose falls", "Shivering to generate heat"],
    ans: 1,
    exp: "<strong>Positive feedback</strong> amplifies a change rather than reversing it. Blood clotting is a classic example — clotting factors activate more clotting factors, escalating the response until the wound is healed."
  },
  {
    q: "Which structure in the brain acts as the 'thermostat', monitoring and regulating body temperature?",
    opts: ["Pituitary gland", "Cerebellum", "Hypothalamus", "Medulla oblongata"],
    ans: 2,
    exp: "The <strong>hypothalamus</strong> contains thermoreceptors that detect changes in blood temperature and coordinates the body's heating and cooling responses."
  },
  {
    q: "In humans, which response occurs when core body temperature rises above normal?",
    opts: [
      "Vasoconstriction of skin arterioles",
      "Erector pili muscles contracting",
      "Increased metabolic rate",
      "Vasodilation of skin arterioles to increase heat loss"
    ],
    ans: 3,
    exp: "<strong>Vasodilation</strong> of arterioles near the skin surface allows more blood to flow close to the surface, increasing heat loss by radiation and convection — helping cool the body."
  },
  {
    q: "Which of the following describes a component of homeostasis that detects changes from the normal range?",
    opts: [
      "Receptor / sensor",
      "Effector",
      "Hormone",
      "Synapse"
    ],
    ans: 0,
    exp: "A <strong>receptor (sensor)</strong> detects the stimulus (the change from set point). The effector then brings about the corrective response."
  },
  {
    q: "Childbirth contractions intensify progressively until delivery. What type of feedback does this represent?",
    opts: [
      "Negative feedback",
      "Positive feedback",
      "Neutral feedback",
      "Hormonal suppression"
    ],
    ans: 1,
    exp: "<strong>Positive feedback</strong> — oxytocin causes contractions, which stimulate more oxytocin release, amplifying contractions until the baby is delivered."
  },

  // ── ENDOCRINE SYSTEM ──────────────────────────────────────────────────
  {
    section: "🧪 Endocrine System",
    q: "A student is studying glands in the body. How does a ductless hormone-secreting gland differ from one that secretes through a duct?",
    opts: [
      "A gland that secretes substances through a duct",
      "A gland found only in the brain",
      "A ductless gland that releases hormones directly into the bloodstream",
      "A gland that only responds to nerve signals"
    ],
    ans: 2,
    exp: "<strong>Endocrine glands</strong> are ductless — they secrete hormones directly into the bloodstream, which carries them to target organs or cells."
  },
  {
    q: "What is the primary role of a hormone in the body?",
    opts: [
      "Speed up chemical reactions as a catalyst",
      "Insulate nerve fibres",
      "Provide energy to cells",
      "Act as a chemical messenger to coordinate bodily functions"
    ],
    ans: 3,
    exp: "Hormones are <strong>chemical messengers</strong> produced by endocrine glands, transported in the blood to target organs where they trigger specific responses."
  },
  {
    q: "A patient has a swollen thyroid. A doctor would examine which region of the body?",
    opts: [
      "In the neck, wrapped around the trachea",
      "Behind the stomach, near the pancreas",
      "Inside the thoracic cavity near the heart",
      "Within the brain"
    ],
    ans: 0,
    exp: "The <strong>thyroid gland</strong> is located in the neck, anterior to the trachea. It produces thyroxine which regulates metabolic rate."
  },
  {
    q: "Excessive secretion of insulin from the pancreas would most likely result in:",
    opts: ["Hyperglycaemia (high blood glucose)", "Hypoglycaemia (low blood glucose)", "Diabetes mellitus", "Increased urine production"],
    ans: 1,
    exp: "<strong>Hypersecretion of insulin</strong> causes too much glucose to be removed from the blood, leading to <strong>hypoglycaemia</strong> — dangerously low blood glucose levels."
  },
  {
    q: "The pancreas is often described as having both endocrine AND exocrine functions. Which of these is its endocrine function?",
    opts: [
      "Releasing digestive enzymes into the duodenum via a duct",
      "Absorbing glucose from the intestine",
      "Secreting insulin and glucagon directly into the bloodstream",
      "Storing bile"
    ],
    ans: 2,
    exp: "The <strong>islets of Langerhans</strong> in the pancreas are endocrine — they secrete <strong>insulin and glucagon</strong> directly into the blood to regulate blood glucose."
  },
  {
    q: "Which hormone is produced by the adrenal glands in response to stress, preparing the body for 'fight or flight'?",
    opts: [
      "Insulin",
      "Thyroxine",
      "Oestrogen",
      "Adrenaline (epinephrine)"
    ],
    ans: 3,
    exp: "<strong>Adrenaline</strong> is released by the adrenal medulla. It increases heart rate, dilates airways, and redirects blood to muscles — the classic fight-or-flight response."
  },

  // ── KIDNEY & OSMOREGULATION ───────────────────────────────────────────
  {
    section: "💧 Kidney & Osmoregulation",
    q: "Blood is delivered to the kidneys for filtration via which vessel?",
    opts: [
      "Afferent arterioles",
      "Efferent arterioles",
      "Renal vein",
      "Capillaries directly"
    ],
    ans: 0,
    exp: "<strong>Afferent arterioles</strong> carry blood INTO the glomerulus of the kidney. Efferent arterioles carry blood away from the glomerulus."
  },
  {
    q: "Fluid has just been filtered from the glomerulus. What is the very next tubular structure it enters?",
    opts: [
      "Distal convoluted tubule",
      "Proximal convoluted tubule",
      "Loop of Henle",
      "Collecting duct"
    ],
    ans: 1,
    exp: "Filtrate passes from Bowman's capsule into the <strong>proximal convoluted tubule (PCT)</strong>, where most reabsorption of glucose, amino acids, and water occurs."
  },
  {
    q: "ADH (antidiuretic hormone) acts on the kidneys to:",
    opts: [
      "Increase urine volume by reducing water reabsorption",
      "Increase salt excretion",
      "Decrease urine volume by increasing water reabsorption",
      "Reduce blood pressure by dilating arterioles"
    ],
    ans: 2,
    exp: "<strong>ADH</strong> increases the permeability of the collecting duct to water, so more water is reabsorbed back into the blood — producing less, more concentrated urine."
  },
  {
    q: "Where in the brain are osmoreceptors — cells that detect changes in blood water potential — located?",
    opts: [
      "Pituitary gland",
      "Cerebellum",
      "Amygdala",
      "Hypothalamus"
    ],
    ans: 3,
    exp: "<strong>Osmoreceptors</strong> are located in the <strong>hypothalamus</strong>. When blood solute concentration rises (low water potential), they trigger ADH release from the posterior pituitary."
  },
  {
    q: "In the loop of Henle, the descending limb is permeable to water but not solutes. The ascending limb is permeable to solutes but not water. What is the overall purpose of this arrangement?",
    opts: [
      "To create a concentration gradient in the medulla that drives water reabsorption",
      "To filter large proteins",
      "To destroy toxins",
      "To produce urine directly"
    ],
    ans: 0,
    exp: "The countercurrent multiplier in the loop of Henle builds up a <strong>high solute concentration gradient</strong> in the medulla. This gradient draws water out of the collecting duct when ADH is present."
  },
  {
    q: "A substance passes through the glomerulus into the nephron but does not appear in urine in a healthy person. Which substance fits this description?",
    opts: [
      "Urea",
      "Glucose",
      "Water",
      "Creatinine"
    ],
    ans: 1,
    exp: "<strong>Glucose</strong> is filtered into the Bowman's capsule but is completely reabsorbed in the proximal convoluted tubule in a healthy person — so it does not appear in normal urine."
  },
  {
    q: "If a person drinks large amounts of water, what would happen to ADH release and urine output?",
    opts: [
      "ADH increases; urine output decreases",
      "ADH increases; urine output increases",
      "ADH decreases; urine output increases",
      "No change occurs"
    ],
    ans: 2,
    exp: "Drinking lots of water dilutes the blood (raises water potential). Osmoreceptors detect this and <strong>suppress ADH release</strong>, so the kidneys reabsorb less water, producing more dilute urine."
  },

  // ── NERVOUS SYSTEM ────────────────────────────────────────────────────
  {
    section: "⚡ Nervous System",
    q: "What is the function of the myelin sheath that surrounds many axons?",
    opts: [
      "To produce neurotransmitters",
      "To provide nutrition to the neurone",
      "To connect two neurones at a synapse",
      "To electrically insulate the axon and speed up nerve impulse conduction"
    ],
    ans: 3,
    exp: "The <strong>myelin sheath</strong> is a fatty insulating layer formed by Schwann cells. It causes the nerve impulse to 'jump' between nodes of Ranvier (saltatory conduction), greatly increasing speed."
  },
  {
    q: "What is the function of dendrites on a neurone?",
    opts: [
      "Carry impulses towards the cell body from receptors or other neurones",
      "Carry impulses away from the cell body to the next cell",
      "Produce the action potential",
      "Release neurotransmitters"
    ],
    ans: 0,
    exp: "<strong>Dendrites</strong> receive signals from other neurones or receptors and carry those impulses <strong>towards</strong> the cell body. The axon carries impulses away."
  },
  {
    q: "After a large meal, the body prioritises digestion. Which division of the autonomic nervous system dominates during this state?",
    opts: [
      "Somatic nervous system",
      "Parasympathetic nervous system",
      "Sympathetic nervous system",
      "Central nervous system"
    ],
    ans: 1,
    exp: "The <strong>parasympathetic</strong> nervous system promotes rest and digestion — it slows the heart, increases peristalsis, and increases intestinal secretions. Sympathetic is fight-or-flight."
  },
  {
    q: "A reflex arc allows rapid, involuntary responses. In the correct order, which structures are involved?",
    opts: [
      "Brain → spinal cord → muscle",
      "Sensory neurone → receptor → brain → effector",
      "Receptor → sensory neurone → relay neurone → motor neurone → effector",
      "Effector → motor neurone → receptor"
    ],
    ans: 2,
    exp: "A <strong>reflex arc</strong>: Receptor → Sensory neurone → Relay neurone (in spinal cord) → Motor neurone → Effector (muscle/gland). This bypasses the brain for speed."
  },
  {
    q: "Which part of the brain controls vital functions such as heart rate, breathing rate, and blood pressure?",
    opts: ["Cerebrum", "Hypothalamus", "Cerebellum", "Medulla oblongata"],
    ans: 3,
    exp: "The <strong>medulla oblongata</strong> (brainstem) regulates autonomic, life-sustaining functions: heart rate, breathing rhythm, and blood pressure."
  },
  {
    q: "What happens at a synapse when a nerve impulse arrives at the pre-synaptic terminal?",
    opts: [
      "Synaptic vesicles release neurotransmitters into the synaptic cleft",
      "Electrical current jumps directly to the next neurone",
      "The axon grows longer",
      "Calcium ions are pumped out of the cell"
    ],
    ans: 0,
    exp: "When an action potential arrives, <strong>calcium ions</strong> enter the pre-synaptic knob, causing synaptic vesicles to fuse with the membrane and release <strong>neurotransmitters</strong> (e.g. acetylcholine) into the cleft."
  },
  {
    q: "Which neurotransmitter is released at the neuromuscular junction to trigger muscle contraction?",
    opts: [
      "Dopamine",
      "Acetylcholine",
      "Serotonin",
      "Noradrenaline"
    ],
    ans: 1,
    exp: "<strong>Acetylcholine (ACh)</strong> is released from motor neurones at the neuromuscular junction. It binds to receptors on the muscle fibre, causing depolarisation and ultimately contraction."
  },
  {
    q: "During an action potential, depolarisation occurs when:",
    opts: [
      "Potassium ions rush out of the neurone",
      "Chloride ions enter the neurone",
      "Sodium ions rush into the neurone, making the inside more positive",
      "The resting potential is maintained"
    ],
    ans: 2,
    exp: "Depolarisation: voltage-gated <strong>sodium (Na⁺) channels</strong> open, sodium rushes in, and the membrane potential rises from about −70mV to +40mV. This is the 'rising phase' of the action potential."
  },
  {
    q: "Which part of the brain, if damaged, would most likely impair balance and co-ordination of movement?",
    opts: [
      "Frontal lobe",
      "Thalamus",
      "Medulla oblongata",
      "Cerebellum"
    ],
    ans: 3,
    exp: "The <strong>cerebellum</strong> is responsible for co-ordinating movement, balance, and fine motor control. Damage causes ataxia (loss of muscle co-ordination)."
  },
  {
    q: "The sympathetic nervous system releases which neurotransmitter at effector organs?",
    opts: [
      "Noradrenaline (norepinephrine) at most effectors",
      "Acetylcholine only",
      "Serotonin",
      "GABA"
    ],
    ans: 0,
    exp: "The sympathetic nervous system primarily releases <strong>noradrenaline</strong> at target organs, causing fight-or-flight responses such as increased heart rate and dilated pupils."
  },

  // ── MUSCULOSKELETAL SYSTEM ────────────────────────────────────────────
  {
    section: "💪 Musculoskeletal System",
    q: "According to the sliding filament theory, muscle contraction occurs when:",
    opts: ["Myosin filaments grow longer", "Actin filaments slide over myosin filaments, shortening the sarcomere", "ATP is converted to ADP without movement", "Calcium ions bind directly to myosin"],
    ans: 1,
    exp: "In the <strong>sliding filament theory</strong>, myosin heads bind to actin, then pivot (power stroke), pulling actin filaments towards the centre of the sarcomere — shortening the muscle."
  },
  {
    q: "What is the role of calcium ions in muscle contraction?",
    opts: [
      "They form cross-bridges with actin directly",
      "They provide energy for contraction",
      "They bind to troponin, which moves tropomyosin away, exposing actin binding sites for myosin",
      "They relax the muscle after contraction"
    ],
    ans: 2,
    exp: "<strong>Ca²⁺</strong> binds to troponin on the actin filament, causing tropomyosin to shift and expose the myosin-binding sites on actin — allowing cross-bridge formation and contraction."
  },
  {
    q: "A biology student lists the roles of the human skeleton. Which item on their list is incorrect?",
    opts: [

let answered = 0;
let correct = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  let currentSection = '';
  questions.forEach((q, i) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const sec = document.createElement('div');
      sec.className = 'section-label';
      sec.textContent = currentSection;
      container.appendChild(sec);
    }
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;
    const letters = ['A','B','C','D'];
    const optsHtml = q.opts.map((o, oi) =>
      `<button class="opt-btn" onclick="answer(${i},${oi})">
        <span class="letter">${letters[oi]}</span>${o}
       </button>`).join('');
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${i+1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options" id="opts-${i}">${optsHtml}</div>
      <div class="explanation" id="exp-${i}">📖 ${q.exp}</div>`;
    container.appendChild(card);
  });
}

function answer(qi, chosen) {
  const q = questions[qi];
  const card = document.getElementById(`card-${qi}`);
  const opts = document.querySelectorAll(`#opts-${qi} .opt-btn`);
  const exp = document.getElementById(`exp-${qi}`);
  if (card.classList.contains('answered') || card.classList.contains('correct') || card.classList.contains('incorrect')) return;
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct-ans');
    else if (i === chosen) btn.classList.add('wrong-ans');
  });
  exp.classList.add('show');
  answered++;
  const isCorrect = chosen === q.ans;
  if (isCorrect) { correct++; card.classList.add('correct'); }
  else { card.classList.add('incorrect'); }
  document.getElementById('score-display').textContent = `${correct} / ${answered}`;
  const pct = Math.round((correct / answered) * 100);
  document.getElementById('pct-display').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = Math.round((answered / questions.length) * 100) + '%';
}

function normalise(s) {
  return s.toLowerCase().replace(/[^a-z0-9\+]/g, '').trim();
}

function buildGapFills() {
  const container = document.getElementById('gf-container');
  gapFills.forEach((gf, gi) => {
    const card = document.createElement('div');
    card.className = 'gf-card';
    card.id = `gfcard-${gi}`;

    // Word bank display (deduplicated for display)
    const uniqueWords = [...new Set(gf.wordbank)];
    const bankHtml = uniqueWords.map(w => `<span>${w}</span>`).join('');

    card.innerHTML = `
      <div class="gf-header">
        <span class="gf-num">GF${gi+1}</span>
        <span class="gf-label">GAP FILL · 3 marks</span>
        <span class="gf-text" style="margin-left:0.4rem">${gf.section} — ${gf.q}</span>

      <div class="gf-passage" id="gfpassage-${gi}">${gf.passage}</div>
      <div class="gf-wordbank"><em>Word bank:</em>${bankHtml}</div>
      <button class="gf-submit-btn" id="gfbtn-${gi}" onclick="markGapFill(${gi})">Check Answers</button>
      <div class="gf-result-row" id="gfresult-${gi}"></div>
      <div class="gf-explanation" id="gfexp-${gi}">📖 ${gf.exp}</div>`;

    container.appendChild(card);

    // Replace <span class="gf-blank-wrap" data-i="X"></span> with actual inputs
    const passage = card.querySelector(`#gfpassage-${gi}`);

    wraps.forEach((wrap, wi) => {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'gf-blank';
      input.placeholder = `(${wi+1})`;
      input.id = `gfinput-${gi}-${wi}`;
      input.setAttribute('autocomplete', 'off');
      wrap.replaceWith(input);
    });
  });
}

function markGapFill(gi) {
  const gf = gapFills[gi];
  const card = document.getElementById(`gfcard-${gi}`);
  const btn = document.getElementById(`gfbtn-${gi}`);
  const resultRow = document.getElementById(`gfresult-${gi}`);
  const expDiv = document.getElementById(`gfexp-${gi}`);

  let score = 0;
  let resultParts = [];

  gf.answers.forEach((ans, i) => {
    const input = document.getElementById(`gfinput-${gi}-${i}`);
    if (!input) return;
    const userVal = normalise(input.value);
    const correct = normalise(ans);
    input.disabled = true;
    if (userVal === correct) {
      input.classList.add('gf-correct');
      score++;
      resultParts.push(`<span class="mark">✓ (${i+1}) Correct</span>`);
    } else {
      input.classList.add('gf-wrong');
      resultParts.push(`<span class="mark-wrong">✗ (${i+1}) Incorrect — answer: ${gf.answers[i]}</span>`);
    }
  });

  btn.disabled = true;
  card.classList.add('gf-done');
  resultRow.innerHTML = `Score: <span class="mark">${score}/${gf.answers.length}</span> &nbsp;|&nbsp; ` + resultParts.join(' &nbsp;|&nbsp; ');
  resultRow.classList.add('show');
  expDiv.classList.add('show');
}
